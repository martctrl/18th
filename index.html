<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trisha Mae — A Decade & Eight</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e8f4fb;
      font-family: 'Cinzel', serif;
      color: #1a237e;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255,255,255,0.97);
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(26,35,126,0.1);
    }
    .brand {
      font-family: 'Great Vibes', cursive;
      font-size: 1.8rem; color: #1a237e; text-decoration: none;
    }
    .burger {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px; padding: 4px;
    }
    .burger span {
      display: block; width: 25px; height: 2px;
      background: #1a237e; border-radius: 2px; transition: all 0.3s;
    }
    .burger.open span:nth-child(1){ transform: rotate(45deg) translate(5px,5px); }
    .burger.open span:nth-child(2){ opacity: 0; }
    .burger.open span:nth-child(3){ transform: rotate(-45deg) translate(5px,-5px); }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 998; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: -100%;
      width: min(280px, 80vw); height: 100vh;
      background: #fff; z-index: 999;
      padding: 5rem 2rem 2rem;
      transition: right 0.3s ease;
      box-shadow: -4px 0 20px rgba(26,35,126,0.12);
      overflow-y: auto;
    }
    .drawer.open { right: 0; }
    .drawer a {
      display: block; font-family: 'Cinzel', serif;
      font-size: 0.8rem; letter-spacing: 0.2em;
      color: #1a237e; text-decoration: none;
      padding: 1rem 0; border-bottom: 1px solid #e8f0fe;
      transition: padding-left 0.2s, color 0.2s;
    }
    .drawer a:hover { color: #3949ab; padding-left: 0.5rem; }

    .section {
        width: 100%;
        padding-top: 60px; 
    }

    .section img {
        width: 100%;
        display: block;
    }
    .image-wrapper {
        position: relative;
    }

    .image-wrapper img {
        width: 100%;
        display: block;
    }

    .location-overlay {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        background: rgba(255, 255, 255, 0.9);
        padding: 18px 25px;
        border-radius: 15px;
        color: #1a237e;
        width: 80%;
        max-width: 450px;
    }

    .location-overlay h3 {
        margin-bottom: 6px;
        font-size: 1rem;
        letter-spacing: 0.15em;
    }

    .location-overlay p {
        font-size: 0.75rem;
        margin: 4px 0;
    }

    .location-overlay a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 18px;
    background: #1a237e;
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    }

    #rsvp {
      background: #e8f4fb;
      text-align: center;
      padding: 5rem 1.5rem;
    }
    #rsvp h2 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 10vw, 5rem);
      color: #1a237e; margin-bottom: 0.8rem;
    }
    #rsvp p {
      font-size: 0.9rem; letter-spacing: 0.05em;
      color: #3949ab; margin-bottom: 2rem; line-height: 1.8;
    }
    .rsvp-btn {
      display: inline-block; padding: 1rem 3rem;
      background: #1a237e; color: #fff;
      font-family: 'Cinzel', serif; font-size: 0.8rem;
      letter-spacing: 0.25em; text-decoration: none;
      border-radius: 50px;
      transition: background 0.3s, transform 0.2s;
    }
    .rsvp-btn:hover { background: #3949ab; transform: translateY(-2px); }


    footer {
      background: #1a237e; color: rgba(255,255,255,0.5);
      text-align: center; padding: 2rem 1.5rem;
      font-size: 0.6rem; letter-spacing: 0.3em;
    }
    footer span {
      display: block; font-family: 'Great Vibes', cursive;
      font-size: 2rem; color: #fff; margin-bottom: 0.4rem;
    }
  </style>
</head>
<body>


<nav>
  <a href="#home" class="brand">Trisha Mae</a>
  <button class="burger" id="burger">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <a href="#home"          onclick="close()">Home</a>
  <a href="#candles-roses" onclick="close()">18 Candles & Roses</a>
  <a href="#gifts-bills"   onclick="close()">18 Gifts & Bills</a>
  <a href="#dress-code"    onclick="close()">Dress Code & Location</a>
  <a href="#rsvp"          onclick="close()">RSVP</a>
</div>

<section class="section" id="home">
  <img src="home.jpg" alt="Trisha Mae Home">
</section>


<section class="section" id="candles-roses">
  <img src="candles-roses.jpg" alt="18 Candles and Roses">
</section>

<section class="section" id="gifts-bills">
  <img src="gifts-bills.jpg" alt="18 Gifts and Bills">
</section>

<section class="section" id="dress-code">
  <div class="image-wrapper">
    <img src="dresscode-location.jpg" alt="Dress Code">

    <div class="location-overlay">
      <h3> JOLLIBEE VISTA MALL SOMO</h3>
      <p>BACOOR, CAVITE</p>
      <a href="https://maps.app.goo.gl/Pb9QcXZEqMshTdCz9" target="_blank">VIEW MAP</a>
    </div>
  </div>
</section>

<section id="rsvp">
  <h2>RSVP</h2>
  <p>
    We can't wait to celebrate with you!<br>
    Please respond on or before <strong>March 7.</strong>
  </p>
<iframe src="https://forms.gle/we6aq8pXLow9rnpc6"
width="100%" height="600" frameborder="0" style="display: block; margin-top:2rem; border-radius:12px;">
</iframe>
</section>

<footer>
  <span>Trisha Mae</span>
  SATURDAY · MARCH 21 · 6:00 PM · JOLLIBEE VISTA MALL SOMO · BACOOR, CAVITE
</footer>


<script>
  const burger  = document.getElementById('burger');
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');

  burger.addEventListener('click', () => {
    const open = drawer.classList.toggle('open');
    overlay.classList.toggle('open', open);
    burger.classList.toggle('open', open);
    document.body.style.overflow = open ? 'hidden' : '';
  });
  overlay.addEventListener('click', close);

  function close() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    burger.classList.remove('open');
    document.body.style.overflow = '';
  }
</script>
</body>
</html>
